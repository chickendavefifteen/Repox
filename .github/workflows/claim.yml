name: Claim Free Tokens

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scan only, do not claim)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scan-and-claim:
    name: Scan chains + claim tokens
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for claimable tokens
        run: node scripts/scan.js
        env:
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}

      - name: Execute claims
        run: node scripts/claim.js
        env:
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GAS_VALUE_MULTIPLIER: '3'

      - name: Commit updated portfolio data
        run: |
          git config user.name  "claim-bot[bot]"
          git config user.email "claim-bot@users.noreply.github.com"
          echo "--- portfolio.json first line ---"
          head -3 data/portfolio.json
          echo "--- git status ---"
          git status
          git add data/portfolio.json data/claims.json data/pending.json || true
          echo "--- staged diff ---"
          git diff --staged --stat
          git commit -m "bot: update portfolio data $(date -u +%Y-%m-%d)" || echo "[nothing to commit]"
          git push origin main || echo "[push failed]"

      - name: Summary
        if: always()
        run: |
          echo "## Free Token Claimer - Daily Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/portfolio.json ]; then
            CLAIMABLES=$(jq '.claimables | length' data/portfolio.json 2>/dev/null || echo 0)
            TOTAL_USD=$(jq '("$" + (.totalClaimableUsd // 0 | tostring))' -r data/portfolio.json 2>/dev/null || echo '$0')
            LAST_SCAN=$(jq -r '.lastScan // "never"' data/portfolio.json 2>/dev/null || echo 'unknown')
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Last scan | $LAST_SCAN |" >> $GITHUB_STEP_SUMMARY
            echo "| Claimable positions found | $CLAIMABLES |" >> $GITHUB_STEP_SUMMARY
            echo "| Total claimable value | $TOTAL_USD |" >> $GITHUB_STEP_SUMMARY
          fi
