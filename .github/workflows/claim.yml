name: Claim Free Tokens

on:
  schedule:
    # Runs daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scan only, do not claim)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scan-and-claim:
    name: Scan chains + claim tokens
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for claimable tokens
        # Scan works with address only — no private key needed
        run: node scripts/scan.js
        env:
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}

      - name: Execute claims
        # Only runs if WALLET_PRIVATE_KEY secret has been set
        if: ${{ secrets.WALLET_PRIVATE_KEY != '' }}
        run: node scripts/claim.js
        env:
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GAS_VALUE_MULTIPLIER: '3'

      - name: Commit updated portfolio data
        run: |
          git config user.name  "claim-bot[bot]"
          git config user.email "claim-bot@users.noreply.github.com"
          git add data/portfolio.json data/claims.json data/pending.json data/wallet.json || true
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "bot: update portfolio data $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Free Token Claimer — Daily Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f data/portfolio.json ]; then
            CLAIMABLES=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/portfolio.json')); console.log(d.claimables?.length || 0)")
            TOTAL_USD=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/portfolio.json')); console.log('$' + (d.totalClaimableUsd || 0).toFixed(2))")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Claimable positions found | $CLAIMABLES |" >> $GITHUB_STEP_SUMMARY
            echo "| Total claimable value | $TOTAL_USD |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ secrets.WALLET_PRIVATE_KEY }}" = "" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Auto-claiming is inactive.** Add the \`WALLET_PRIVATE_KEY\` secret to enable it." >> $GITHUB_STEP_SUMMARY
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f data/claims.json ]; then
            CLAIMS=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/claims.json')); console.log(d.length)")
            echo "| Total historical claims | $CLAIMS |" >> $GITHUB_STEP_SUMMARY
          fi
