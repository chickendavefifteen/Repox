name: Claim Free Tokens

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scan only, do not claim)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scan-and-claim:
    name: Scan chains + claim tokens
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for claimable tokens
        run: node scripts/scan.js
        env:
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}

      - name: Execute claims
        run: node scripts/claim.js
        env:
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GAS_VALUE_MULTIPLIER: '3'

      - name: Push scan data to main via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          commit_file() {
            local path=$1
            local file=$2
            if [ ! -f "$file" ]; then return; fi
            local content=$(base64 -w 0 "$file")
            local sha=$(curl -sf \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/contents/$path?ref=main" \
              | jq -r '.sha // empty')
            local body
            if [ -n "$sha" ]; then
              body=$(jq -n --arg m "bot: update $path $(date -u +%Y-%m-%d)" \
                           --arg c "$content" --arg s "$sha" \
                           '{message:$m,content:$c,sha:$s,branch:"main"}')
            else
              body=$(jq -n --arg m "bot: create $path $(date -u +%Y-%m-%d)" \
                           --arg c "$content" \
                           '{message:$m,content:$c,branch:"main"}')
            fi
            local result=$(curl -sf -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/contents/$path" \
              -d "$body")
            echo "Updated $path: $(echo $result | jq -r '.commit.sha // "error"')"
          }

          commit_file "data/portfolio.json" "data/portfolio.json"
          commit_file "data/claims.json"    "data/claims.json"
          commit_file "data/pending.json"   "data/pending.json"

      - name: Summary
        if: always()
        run: |
          echo "## Free Token Claimer - Daily Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/portfolio.json ]; then
            CLAIMABLES=$(jq '.claimables | length' data/portfolio.json 2>/dev/null || echo 0)
            TOTAL_USD=$(jq '("$" + (.totalClaimableUsd // 0 | tostring))' -r data/portfolio.json 2>/dev/null || echo '$0')
            LAST_SCAN=$(jq -r '.lastScan // "never"' data/portfolio.json 2>/dev/null || echo 'unknown')
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Last scan | $LAST_SCAN |" >> $GITHUB_STEP_SUMMARY
            echo "| Claimable positions | $CLAIMABLES |" >> $GITHUB_STEP_SUMMARY
            echo "| Total claimable value | $TOTAL_USD |" >> $GITHUB_STEP_SUMMARY
          fi
